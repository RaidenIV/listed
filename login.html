<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Listed.</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --brand: #4b13f0;
    --brand-light: #eeeafe;
    --brand-border: rgba(75,19,240,0.16);
    --white: #ffffff;
    --green: #1ef012;
    --text-primary: #111111;
    --text-secondary: #555555;
    --text-tertiary: #aaaaaa;
    --border: #e8e8ee;
    --border-mid: #e0e0e0;
    --surface: #f4f4f8;
    --bg: #f0f0f6;
  }
  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 22px;
    width: 100%;
    max-width: 400px;
    padding: 32px 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  }
  .brand { text-align: center; margin-bottom: 22px; }
  .brand-logo { font-size: 30px; font-weight: 900; letter-spacing: -1.2px; color: var(--brand); line-height: 1; }
  .brand-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  .tabs { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 22px; }
  .tab {
    flex: 1; text-align: center; padding: 9px 0; border-radius: 9px;
    font-size: 13px; font-weight: 700; color: var(--text-secondary);
    cursor: pointer; border: none; background: transparent; transition: all 0.16s;
  }
  .tab.active { background: var(--white); color: var(--brand); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .input-wrap { position: relative; }
  .field input {
    width: 100%; border: 1px solid var(--border-mid); border-radius: 11px;
    padding: 12px 14px; font: inherit; font-size: 14px; color: var(--text-primary);
    background: var(--white); outline: none; transition: border-color 0.14s, box-shadow 0.14s;
  }
  .field input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-border); }
  .input-wrap .toggle-pw {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-tertiary); cursor: pointer;
    font-size: 18px; display: flex; padding: 4px;
  }
  .hint-row { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; }
  .remember-row {
    display: none;
    align-items: center;
    gap: 8px;
    margin: -2px 0 14px;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
  }
  .remember-row.visible { display: flex; }
  .remember-row input {
    width: 15px;
    height: 15px;
    accent-color: var(--brand);
    cursor: pointer;
  }

  .btn-primary {
    width: 100%; border: none; border-radius: 11px; background: var(--brand); color: #fff;
    font: inherit; font-weight: 700; font-size: 14px; padding: 13px; cursor: pointer;
    margin-top: 6px; transition: filter 0.14s;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:disabled { opacity: 0.6; cursor: default; }

  .msg { border-radius: 11px; padding: 11px 14px; font-size: 13px; font-weight: 500; margin-bottom: 16px; line-height: 1.5; }
  .msg.error { background: #fde8e8; color: #c0392b; }
  .msg.success { background: #e7fae6; color: #1f8b18; }
  .msg.info { background: var(--brand-light); color: var(--brand); }
  .msg a { color: inherit; font-weight: 700; }
  [hidden] { display: none !important; }

  .check-state { text-align: center; padding: 6px 0 0; }
  .check-state .ti { font-size: 44px; color: var(--brand); }
  .check-state.ok .ti { color: #1f8b18; }
  .check-state h2 { font-size: 18px; font-weight: 800; margin: 12px 0 6px; }
  .check-state p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .check-state .email-pill { font-weight: 700; color: var(--text-primary); }

  .linkbtn { background: none; border: none; color: var(--brand); font: inherit; font-weight: 700; font-size: 13px; cursor: pointer; padding: 0; }
  .foot { text-align: center; margin-top: 20px; font-size: 12px; }
  .foot a { color: var(--text-secondary); text-decoration: none; }
  .foot a:hover { color: var(--brand); }
</style>
</head>
<body>
  <div class="auth-card">
    <div class="brand">
      <div class="brand-logo">Listed</div>
      <div class="brand-sub">Real people. Real listings. Real sales.</div>
    </div>

    <div id="message" class="msg" hidden></div>

    <!-- Sign-in / sign-up form -->
    <div id="formView">
      <div class="tabs">
        <button class="tab active" id="tabLogin">Sign in</button>
        <button class="tab" id="tabSignup">Create account</button>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
          <button class="toggle-pw" id="togglePw" type="button" aria-label="Show password"><i class="ti ti-eye"></i></button>
        </div>
        <div class="hint-row" id="pwHint" hidden>At least 8 characters.</div>
      </div>

      <label class="remember-row visible" id="rememberRow" for="rememberMe">
        <input id="rememberMe" type="checkbox" checked>
        <span>Remember me</span>
      </label>

      <button class="btn-primary" id="submitBtn">Sign in</button>
    </div>

    <!-- "Check your email" state after signup -->
    <div id="checkState" class="check-state" hidden>
      <i class="ti ti-mail-fast"></i>
      <h2>Check your email</h2>
      <p>We sent a link to <span class="email-pill" id="sentTo"></span>.<br>Click it to activate your account.</p>
      <p style="margin-top:14px;">Didn't get it? <button class="linkbtn" id="resendBtn">Resend link</button></p>
    </div>

    <!-- Verified success state -->
    <div id="verifiedState" class="check-state ok" hidden>
      <i class="ti ti-circle-check"></i>
      <h2>Email verified</h2>
      <p id="verifiedMsg">You're all set and signed in.</p>
      <button class="btn-primary" id="goToApp" style="margin-top:18px;">Go to marketplace</button>
    </div>

    <div class="foot"><a href="/">← Back to marketplace</a></div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
